server {
    listen       80;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Uploads (photos / PDFs) can be a few MB.
    client_max_body_size 25m;

    # Compression for text assets.
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_types        text/plain text/css application/javascript application/json image/svg+xml;

    # Baseline security headers.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options        SAMEORIGIN always;
    add_header Referrer-Policy        strict-origin-when-cross-origin always;

    # API → background-removal backend (same-origin, so no CORS needed).
    location /api/ {
        proxy_pass            http://backend:7000/;
        proxy_http_version    1.1;
        proxy_set_header      Host $host;
        proxy_set_header      X-Real-IP $remote_addr;
        proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header      X-Forwarded-Proto $scheme;
        proxy_read_timeout    120s;   # first inference / model load can be slow
        proxy_send_timeout    120s;
    }

    # Cache static assets aggressively (the app cache-busts JS/CSS with ?v=N).
    location ~* \.(?:js|css|svg|png|jpg|jpeg|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
